services:
  - type: web
    name: resumexpert
    runtime: node
    plan: free
    buildCommand: bash ./scripts/render-build.sh
    startCommand: bash ./scripts/render-start.sh
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true

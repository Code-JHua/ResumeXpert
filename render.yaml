services:
  - type: web
    name: resumexpert
    runtime: node
    plan: free
    buildCommand: cd backend && npm install --include=dev && cd ../frontend && npm install --include=dev && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
